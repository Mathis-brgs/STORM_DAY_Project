name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build (Makefile = single source of truth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images (same as local make build)
        run: make build

  test-nestjs:
    name: Test & Lint NestJS (User Service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/user/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run lint

  test-nestjs-integration:
    name: Integration Tests (User Service)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/user

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: storm
          POSTGRES_PASSWORD: password
          POSTGRES_DB: storm_user_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: storm
      DB_PASSWORD: password
      DB_NAME: storm_user_db
      JWT_SECRET: storm-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/user/package-lock.json

      - run: npm ci
      - run: npm run test:e2e

  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.6"
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: ${{ matrix.workdir }}
    strategy:
      matrix:
        workdir:
          - pkg
          - services/gateway
          - services/message
          # - services/media
          # - services/notification

  test-go:
    name: Test Go Services (with coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.6"
          cache-dependency-path: |
            services/gateway/go.sum
            services/message/go.sum
      - name: Run Go tests — Gateway
        working-directory: services/gateway
        run: go test -race -coverprofile=coverage-gateway.out -covermode=atomic ./...
      - name: Run Go tests — Message Service
        working-directory: services/message
        run: go test -race -coverprofile=coverage-message.out -covermode=atomic ./...
      - name: Upload coverage report — Gateway
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gateway
          path: services/gateway/coverage-gateway.out
      - name: Upload coverage report — Message
        uses: actions/upload-artifact@v4
        with:
          name: coverage-message
          path: services/message/coverage-message.out

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem pour vulnérabilités
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Scan image Gateway
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: storm/gateway-service:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
        continue-on-error: true
      - name: Upload résultats Trivy vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
        continue-on-error: true
