apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-exporter
  namespace: storm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-exporter
  template:
    metadata:
      labels:
        app: nats-exporter
    spec:
      containers:
        - name: nats-exporter
          image: natsio/prometheus-nats-exporter:latest
          args:
            - "-varz"
            - "-connz"
            - "-subz"
            - "http://nats:8222"
          ports:
            - containerPort: 7777
              name: metrics
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats-exporter
  namespace: storm
spec:
  selector:
    app: nats-exporter
  ports:
    - name: metrics
      port: 7777
      targetPort: 7777
