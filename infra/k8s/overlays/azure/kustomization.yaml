# ==============================================================================
# KUSTOMIZE OVERLAY - AZURE (AKS)
# ==============================================================================
#
# Cet overlay surcharge la config de base pour Azure.
# Il remplace les services locaux (postgres, redis, minio) par les services
# Azure managés (Azure DB for PostgreSQL, Azure Cache for Redis, Azure Blob).
#
# Usage :
#   kubectl apply -k infra/k8s/overlays/azure
#
# Prérequis :
#   - Cluster AKS provisionné via Terraform (infra/terraform/environments/dev)
#   - Images poussées sur ACR (Azure Container Registry)
#   - Fichier secrets-azure.yaml rempli avec les valeurs réelles
#
# ==============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: storm

# On hérite des ressources de base nécessaires
# On exclut postgres, redis, minio → remplacés par Azure managed services
resources:
  - ../../base/nats.yaml             # NATS reste dans le cluster AKS
  - ../../base/nats-exporter.yaml    # Exporter métriques NATS → Prometheus
  - ../../base/gateway-service.yaml
  - ../../base/user-service.yaml
  - ../../base/message-service.yaml
  - ../../base/media-service.yaml
  - ../../base/notification-service.yaml
  - ../../base/hpa.yaml
  - secrets-azure.yaml

# On NE déploie PAS : postgres-user, postgres-message, redis, minio
# → Remplacés par Azure Database for PostgreSQL, Azure Cache for Redis, Azure Blob

# Surcharger les images avec celles d'ACR (Azure Container Registry)
# Format : <registry>.azurecr.io/<image>:<tag>
images:
  - name: storm/gateway-service
    newName: stormdevacr.azurecr.io/storm-gateway
    newTag: latest
  - name: storm/user-service
    newName: stormdevacr.azurecr.io/storm-user
    newTag: latest
  - name: storm/media-service
    newName: stormdevacr.azurecr.io/storm-media
    newTag: latest
  - name: storm/message-service
    newName: stormdevacr.azurecr.io/storm-message
    newTag: latest
  - name: storm/notification-service
    newName: stormdevacr.azurecr.io/storm-notification
    newTag: latest

# Patcher le user-service pour utiliser Azure DB for PostgreSQL + Azure Redis
patches:
  - target:
      kind: Deployment
      name: user-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_HOST
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_USERNAME
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_PASSWORD
          - name: DB_NAME
            value: storm_user_db
          - name: NATS_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: NATS_URL
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: JWT_SECRET
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: REDIS_URL
          - name: DB_SSL
            value: "true"

  # Patcher le message-service pour Azure DB for PostgreSQL
  - target:
      kind: Deployment
      name: message-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_HOST
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_USERNAME
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: PG_PASSWORD
          - name: DB_NAME
            value: storm_message_db
          - name: NATS_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: NATS_URL
          - name: STORAGE
            value: postgres
          - name: DB_SSLMODE
            value: require

  # Patcher le media-service pour Azure Blob Storage
  - target:
      kind: Deployment
      name: media-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: NATS_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: NATS_URL
          - name: MINIO_ENDPOINT
            value: "minio:9000"
          - name: MINIO_ACCESS_KEY
            value: "stormadmin"
          - name: MINIO_SECRET_KEY
            value: "stormpassword"
          - name: MINIO_BUCKET
            value: "media"

  # Patcher le notification-service pour Azure Redis
  - target:
      kind: Deployment
      name: notification-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: NATS_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: NATS_URL
          - name: REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: REDIS_URL
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: REDIS_PASSWORD

  # Patcher le gateway-service
  - target:
      kind: Deployment
      name: gateway-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: NATS_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: NATS_URL
          - name: USER_SERVICE_URL
            valueFrom:
              configMapKeyRef:
                name: storm-config
                key: USER_SERVICE_URL
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-credentials
                key: JWT_SECRET

  # Changer le type de service gateway en LoadBalancer Azure
  - target:
      kind: Service
      name: gateway-service
    patch: |
      - op: replace
        path: /spec/type
        value: LoadBalancer
      - op: remove
        path: /spec/ports/0/nodePort