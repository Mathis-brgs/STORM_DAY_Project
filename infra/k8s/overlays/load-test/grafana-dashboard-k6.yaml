apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6
  namespace: storm
data:
  storm-k6-load-test.json: |
    {
      "title": "STORM — k6 Load Test",
      "uid": "storm-k6-load-test",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": {"from": "now-30m", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "Test Run",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
            "query": "label_values(k6_vus, testid)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "VUs actifs",
          "gridPos": {"x":0,"y":0,"w":4,"h":4},
          "targets": [{"expr":"sum(k6_vus{testid=~\"$testid\"})","legendFormat":"VUs"}],
          "options": {"colorMode":"background","graphMode":"area","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":50000},{"color":"red","value":90000}]}}}
        },
        {
          "id": 2, "type": "stat", "title": "Connexions WS actives",
          "gridPos": {"x":4,"y":0,"w":4,"h":4},
          "targets": [{"expr":"sum(k6_ws_active_sessions{testid=~\"$testid\"})","legendFormat":"Sessions WS"}],
          "options": {"colorMode":"background","graphMode":"area","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":80000},{"color":"red","value":100000}]}}}
        },
        {
          "id": 3, "type": "stat", "title": "Messages envoyés/s",
          "gridPos": {"x":8,"y":0,"w":4,"h":4},
          "targets": [{"expr":"sum(rate(k6_msg_sent_total{testid=~\"$testid\"}[30s]))","legendFormat":"msg/s"}],
          "options": {"colorMode":"background","graphMode":"area","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"unit":"reqps","thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":400000},{"color":"red","value":500000}]}}}
        },
        {
          "id": 4, "type": "stat", "title": "Taux d'erreurs WS",
          "gridPos": {"x":12,"y":0,"w":4,"h":4},
          "targets": [{"expr":"avg(k6_ws_connection_errors{testid=~\"$testid\"}) * 100","legendFormat":"Erreurs %"}],
          "options": {"colorMode":"background","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"unit":"percent","thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":1},{"color":"red","value":5}]}}}
        },
        {
          "id": 5, "type": "stat", "title": "Latence WS p95",
          "gridPos": {"x":16,"y":0,"w":4,"h":4},
          "targets": [{"expr":"histogram_quantile(0.95, sum(rate(k6_ws_connect_time_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95 ms"}],
          "options": {"colorMode":"background","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"unit":"ms","thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":150},{"color":"red","value":200}]}}}
        },
        {
          "id": 6, "type": "stat", "title": "Round-trip msg p95",
          "gridPos": {"x":20,"y":0,"w":4,"h":4},
          "targets": [{"expr":"histogram_quantile(0.95, sum(rate(k6_msg_roundtrip_ms_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95 ms"}],
          "options": {"colorMode":"background","graphMode":"none","reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig": {"defaults":{"color":{"mode":"thresholds"},"unit":"ms","thresholds":{"steps":[{"color":"green","value":0},{"color":"yellow","value":300},{"color":"red","value":500}]}}}
        },
        {
          "id": 10, "type": "timeseries", "title": "VUs et connexions WS dans le temps",
          "gridPos": {"x":0,"y":4,"w":12,"h":8},
          "targets": [
            {"expr":"sum(k6_vus{testid=~\"$testid\"})","legendFormat":"VUs actifs"},
            {"expr":"sum(k6_ws_active_sessions{testid=~\"$testid\"})","legendFormat":"Connexions WS"},
            {"expr":"sum(k6_vus_max{testid=~\"$testid\"})","legendFormat":"VUs max cible"}
          ],
          "fieldConfig": {"defaults":{"custom":{"lineWidth":2}}}
        },
        {
          "id": 11, "type": "timeseries", "title": "Throughput messages/s",
          "gridPos": {"x":12,"y":4,"w":12,"h":8},
          "targets": [
            {"expr":"sum(rate(k6_msg_sent_total{testid=~\"$testid\"}[30s]))","legendFormat":"Envoyés/s"},
            {"expr":"sum(rate(k6_msg_received_total{testid=~\"$testid\"}[30s]))","legendFormat":"Reçus/s (WS)"}
          ],
          "fieldConfig": {"defaults":{"unit":"reqps","custom":{"lineWidth":2}}}
        },
        {
          "id": 20, "type": "timeseries", "title": "Latence WebSocket handshake",
          "gridPos": {"x":0,"y":12,"w":8,"h":8},
          "targets": [
            {"expr":"histogram_quantile(0.50, sum(rate(k6_ws_connect_time_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p50"},
            {"expr":"histogram_quantile(0.95, sum(rate(k6_ws_connect_time_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95"},
            {"expr":"histogram_quantile(0.99, sum(rate(k6_ws_connect_time_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p99"}
          ],
          "fieldConfig": {"defaults":{"unit":"ms","custom":{"lineWidth":2}}},
          "options": {"tooltip":{"mode":"multi"}}
        },
        {
          "id": 21, "type": "timeseries", "title": "Latence envoi message",
          "gridPos": {"x":8,"y":12,"w":8,"h":8},
          "targets": [
            {"expr":"histogram_quantile(0.50, sum(rate(k6_msg_send_latency_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p50"},
            {"expr":"histogram_quantile(0.95, sum(rate(k6_msg_send_latency_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95"},
            {"expr":"histogram_quantile(0.99, sum(rate(k6_msg_send_latency_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p99"}
          ],
          "fieldConfig": {"defaults":{"unit":"ms","custom":{"lineWidth":2}}}
        },
        {
          "id": 22, "type": "timeseries", "title": "Round-trip message (WS echo)",
          "gridPos": {"x":16,"y":12,"w":8,"h":8},
          "targets": [
            {"expr":"histogram_quantile(0.50, sum(rate(k6_msg_roundtrip_ms_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p50"},
            {"expr":"histogram_quantile(0.95, sum(rate(k6_msg_roundtrip_ms_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95"},
            {"expr":"histogram_quantile(0.99, sum(rate(k6_msg_roundtrip_ms_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p99"}
          ],
          "fieldConfig": {"defaults":{"unit":"ms","custom":{"lineWidth":2}}}
        },
        {
          "id": 30, "type": "timeseries", "title": "HTTP Requests/s (envoi messages)",
          "gridPos": {"x":0,"y":20,"w":12,"h":8},
          "targets": [
            {"expr":"sum(rate(k6_http_reqs_total{testid=~\"$testid\"}[30s]))","legendFormat":"Total req/s"},
            {"expr":"sum(rate(k6_http_reqs_total{testid=~\"$testid\",status=~\"2..\"}[30s]))","legendFormat":"2xx/s"},
            {"expr":"sum(rate(k6_http_reqs_total{testid=~\"$testid\",status=~\"5..\"}[30s]))","legendFormat":"5xx/s"}
          ],
          "fieldConfig": {"defaults":{"unit":"reqps","custom":{"lineWidth":2}}}
        },
        {
          "id": 31, "type": "timeseries", "title": "Erreurs WS / HTTP",
          "gridPos": {"x":12,"y":20,"w":12,"h":8},
          "targets": [
            {"expr":"sum(rate(k6_ws_connection_errors_total{testid=~\"$testid\"}[30s]))","legendFormat":"Erreurs WS/s"},
            {"expr":"sum(rate(k6_msg_errors_total{testid=~\"$testid\"}[30s]))","legendFormat":"Erreurs msg/s"},
            {"expr":"avg(k6_http_req_failed{testid=~\"$testid\"}) * 100","legendFormat":"HTTP failed %"}
          ],
          "fieldConfig": {"defaults":{"custom":{"lineWidth":2}}}
        },
        {
          "id": 40, "type": "timeseries", "title": "Latence HTTP p95 (POST /api/messages)",
          "gridPos": {"x":0,"y":28,"w":12,"h":8},
          "targets": [
            {"expr":"histogram_quantile(0.50, sum(rate(k6_http_req_duration_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p50"},
            {"expr":"histogram_quantile(0.95, sum(rate(k6_http_req_duration_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p95"},
            {"expr":"histogram_quantile(0.99, sum(rate(k6_http_req_duration_seconds_bucket{testid=~\"$testid\"}[1m])) by (le)) * 1000","legendFormat":"p99"}
          ],
          "fieldConfig": {"defaults":{"unit":"ms","custom":{"lineWidth":2}}}
        },
        {
          "id": 41, "type": "timeseries", "title": "Itérations k6 terminées/s",
          "gridPos": {"x":12,"y":28,"w":12,"h":8},
          "targets": [
            {"expr":"sum(rate(k6_iterations_total{testid=~\"$testid\"}[30s]))","legendFormat":"Itérations/s"}
          ],
          "fieldConfig": {"defaults":{"unit":"reqps"}}
        }
      ]
    }
