# Patch Gateway pour 100 000 connexions WebSocket simultanées
# 10 pods × 10 000 conn/pod
# RAM : 10k conn × ~100KB = 1GB/pod → limite 2Gi
# CPU : traitement WS à ~5 msg/s/conn = 50k msg/s/pod → 2 CPU
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: storm
spec:
  # 10 répliques minimum — HPA prendra le relais si besoin
  replicas: 10
  template:
    spec:
      # Tuning noyau pour connexions massives
      # net.core.somaxconn : file d'attente TCP accept
      # net.ipv4.ip_local_port_range : ports éphémères disponibles
      initContainers:
        - name: sysctl-tuning
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sysctl -w net.core.somaxconn=65535
              sysctl -w net.ipv4.ip_local_port_range="1024 65535"
              sysctl -w net.ipv4.tcp_tw_reuse=1
          securityContext:
            privileged: true
      containers:
        - name: gateway-service
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          # Liveness/readiness plus agressif pendant le load test
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
