# Patch NATS — augmentation des ressources pour 500k msg/s JetStream
# NATS single instance peut tenir ~1M msg/s en mémoire avec les bonnes ressources
# Pour un cluster 3-nœuds voir infra/k8s/helm/nats-values.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: storm
spec:
  template:
    spec:
      containers:
        - name: nats
          args:
            - -js
            - -m
            - "8222"
            # Mémoire JetStream : 4GB en mémoire + 20GB sur disque
            - --js_mem_storage
            - 4GB
            - --js_file_storage
            - 20GB
            # Max payload 1MB, max connexions 200k
            - --max_payload
            - "1048576"
            - --max_connections
            - "200000"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "4"
