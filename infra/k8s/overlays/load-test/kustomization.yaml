apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: storm

resources:
  - ../../base
  # Dashboard Grafana k6 (ConfigMap additionnel)
  - grafana-dashboard-k6.yaml

patches:
  # Gateway : scale pour 100k connexions WS
  - path: patches/gateway-patch.yaml
    target:
      kind: Deployment
      name: gateway-service
  # Message Service : scale pour 500k msg/s
  - path: patches/message-patch.yaml
    target:
      kind: Deployment
      name: message-service
  # PostgreSQL Message : tuning haute écriture
  - path: patches/postgres-message-patch.yaml
    target:
      kind: Deployment
      name: postgres-message
  # Redis : mémoire accrue pour sessions
  - path: patches/redis-patch.yaml
    target:
      kind: Deployment
      name: redis
  # NATS : cluster 3 nœuds via StatefulSet
  - path: patches/nats-patch.yaml
    target:
      kind: Deployment
      name: nats
  # HPA : limites ajustées pour load test
  - path: patches/hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: gateway-hpa
  # Prometheus : active le receiver Remote Write pour k6
  - path: patches/prometheus-patch.yaml
    target:
      kind: Deployment
      name: prometheus
  # Grafana : monte le dashboard k6 dans /dashboards/k6/
  - path: patches/grafana-patch.yaml
    target:
      kind: Deployment
      name: grafana
  # Grafana : expose via Azure Load Balancer (IP publique)
  - path: patches/grafana-service-patch.yaml
    target:
      kind: Service
      name: grafana
